<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - Welcome 10th Batch</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cinzel+Decorative:wght@700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --royal: #1a0e3d;
    --deep: #120934;
    --accent-gold: #c9a227;
    --accent-gold-light: #f0c84a;
    --accent-teal: #00b4d8;
    --accent-teal-light: #48e0ff;
    --card-bg: rgba(30,12,80,0.72);
    --card-border: rgba(201,162,39,0.3);
    --text-primary: #f5f0e8;
    --text-muted: rgba(245,240,232,0.6);
    --radius: 22px;
    --radius-sm: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
  }

  .bg-canvas {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(44,20,120,0.9) 0%, var(--deep) 70%);
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    width: 100%;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    backdrop-filter: blur(18px);
    padding: 36px 40px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent-gold);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 20px;
    transition: all 0.3s;
  }
  .back-btn:hover { color: var(--accent-gold-light); transform: translateX(-5px); }

  .section-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 600;
    color: var(--accent-gold-light);
    margin-bottom: 10px;
  }

  .section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent-teal-light);
    opacity: 0.8;
  }

  .gold-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
    margin: 20px 0;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
  }

  .form-input {
    width: 100%;
    background: rgba(20,8,60,0.65);
    border: 1px solid rgba(201,162,39,0.25);
    border-radius: var(--radius-sm);
    padding: 13px 18px;
    color: var(--text-primary);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.3s;
  }
  .form-input:focus { border-color: var(--accent-gold); }
  .form-input::placeholder { color: rgba(245,240,232,0.3); }

  textarea.form-input {
    resize: vertical;
    min-height: 120px;
  }

  .star-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 10px 0;
  }

  .star {
    font-size: 2rem;
    cursor: pointer;
    color: rgba(201,162,39,0.25);
    transition: color 0.2s, transform 0.2s;
    user-select: none;
  }
  .star:hover, .star.lit {
    color: var(--accent-gold-light);
    transform: scale(1.15);
  }

  .btn-gold {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: linear-gradient(135deg, var(--accent-gold), #a07d18);
    color: var(--royal);
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
    justify-content: center;
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,162,39,0.45); }

  .success-message {
    display: none;
    text-align: center;
    padding: 24px;
  }
  .success-message.show { display: block; }
  .big-check {
    font-size: 3rem;
    margin-bottom: 12px;
  }

  @media (max-width: 768px) {
    .card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="container">
  <a href="index.html" class="back-btn">← Back to Home</a>
  
  <div class="card">
    <div class="section-label">We Value Your Opinion</div>
    <div class="section-heading">Share Your Feedback</div>
    <p style="color:var(--text-muted);font-size:0.88rem;margin-top:12px;line-height:1.7">
      Help us improve! Share your thoughts about the welcome experience.
    </p>
    <div class="gold-line"></div>

    <form id="feedback-form" onsubmit="submitFeedback(event)">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input type="text" class="form-input" id="name" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email (Optional)</label>
        <input type="email" class="form-input" id="email" placeholder="your.email@example.com">
      </div>

      <div class="form-group">
        <label class="form-label">Rate Your Experience</label>
        <div class="star-row" id="star-rating">
          <span class="star" data-rating="1" onclick="setRating(1)">★</span>
          <span class="star" data-rating="2" onclick="setRating(2)">★</span>
          <span class="star" data-rating="3" onclick="setRating(3)">★</span>
          <span class="star" data-rating="4" onclick="setRating(4)">★</span>
          <span class="star" data-rating="5" onclick="setRating(5)">★</span>
        </div>
        <input type="hidden" id="rating" value="0" required>
      </div>

      <div class="form-group">
        <label class="form-label">Your Feedback</label>
        <textarea class="form-input" id="feedback" placeholder="Tell us what you think..." required></textarea>
      </div>

      <button type="submit" class="btn-gold">Submit Feedback 💌</button>
    </form>

    <div class="success-message" id="success-msg">
      <div class="big-check">✓</div>
      <div class="section-heading" style="font-size:1.5rem;margin-bottom:10px">Thank You!</div>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:20px">
        Your feedback has been submitted successfully.
      </p>
      <a href="index.html" class="btn-gold">Back to Home</a>
    </div>
  </div>
</div>

<script>
let selectedRating = 0;

function setRating(rating) {
  selectedRating = rating;
  document.getElementById('rating').value = rating;
  
  const stars = document.querySelectorAll('.star');
  stars.forEach((star, index) => {
    if (index < rating) {
      star.classList.add('lit');
    } else {
      star.classList.remove('lit');
    }
  });
}

function submitFeedback(event) {
  event.preventDefault();
  
  if (selectedRating === 0) {
    alert('Please rate your experience!');
    return;
  }
  
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const feedback = document.getElementById('feedback').value;
  
  // Save to localStorage
  let feedbacks = JSON.parse(localStorage.getItem('feedbacks') || '[]');
  feedbacks.push({
    name,
    email,
    rating: selectedRating,
    feedback,
    date: new Date().toISOString()
  });
  localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
  
  // Show success message
  document.getElementById('feedback-form').style.display = 'none';
  document.getElementById('success-msg').classList.add('show');
}
</script>

</body>
</html>
